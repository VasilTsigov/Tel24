    <style>
        #offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #f44336;
            color: white;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            z-index: 1000;
            display: none;
            animation: slideDown 0.3s ease-in;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }
    </style>
